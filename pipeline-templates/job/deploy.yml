parameters:
  - name: ArtifactName
    type: string
  - name: ReleaseNotes
    type: string
    default: 'Automated release from Azure DevOps pipeline.'
  - name: DistributionTarget
    type: string
    default: 'TestFlight'
    values:
      - 'TestFlight'
      - 'AppStore'

jobs:
  - job: Deploy_iOS
    displayName: 'Deploy iOS Application'
    pool:
      vmImage: 'macOS-latest'
    variables:
      DistributionTarget: ${{ parameters.DistributionTarget }}
    steps:
      - template: azure-pipelines-templates/build/step/ios-app-deploy.yml@das-platform-building-blocks
        parameters:
          ArtifactName: ${{ parameters.ArtifactName }}
          ReleaseNotes: ${{ parameters.ReleaseNotes }}
